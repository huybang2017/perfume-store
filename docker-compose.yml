services:
  postgres:
    image: postgres:16-alpine
    container_name: perfume-store-postgres
    environment:
      POSTGRES_DB: perfume_store
      POSTGRES_USER: perfume
      POSTGRES_PASSWORD: perfume
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U perfume']
      interval: 10s
      timeout: 5s
      retries: 5

